name: Process quant jobs

on:
  workflow_dispatch:
    inputs:
      max_jobs:
        description: Maximum queued jobs to process
        required: false
        default: "1"
  schedule:
    - cron: "0 15 * * 1-5"

concurrency:
  group: quant-job-worker
  cancel-in-progress: false

jobs:
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      BANXICO_TOKEN: ${{ secrets.BANXICO_TOKEN }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
      QPK_JOB_COMPUTE_MODE: rigorous
      QPK_JOB_WORKERS: "4"
      QPK_REQUIRE_ATOMIC_PUBLICATION: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.lock.txt
      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.lock.txt
      - name: Process tenant-scoped jobs
        run: python cloud_job_worker.py --max-jobs "${{ inputs.max_jobs || '1' }}"
