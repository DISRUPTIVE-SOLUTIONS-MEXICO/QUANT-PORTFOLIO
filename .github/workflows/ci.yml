name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: |
            requirements.lock.txt
            requirements-dev.txt

      - name: Install dependencies (locked runtime + dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock.txt
          pip install -r requirements-dev.txt

      - name: py_compile (entry points)
        run: python -m py_compile stockpicker_app.py quant_stockpicker_core.py

      - name: Run unit tests
        run: python -m pytest tests -q

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check (hard gate)
        run: ruff check --output-format=github .

      - name: Ruff format check (hard gate)
        run: ruff format --check --diff .

  typecheck:
    name: mypy (quant_core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install mypy (pinned for a reproducible gate)
        run: pip install "mypy==2.1.0" "pandas-stubs==3.0.3.260530" numpy pandas

      - name: mypy quant_core (hard gate; monolith migrates module by module)
        run: mypy quant_core --ignore-missing-imports

  security:
    name: security (bandit + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install security tooling
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit

      - name: Bandit (static security analysis)
        # Skip B101 (assert) and B404 (subprocess module imports) for now;
        # tighten the bandit config (.bandit) as the code matures.
        run: bandit -r . --severity-level medium --skip B101,B404 -x ./tests,./paper,./scripts -f txt

      - name: pip-audit (dependency CVE scan)
        run: |
          pip install -r requirements.txt
          pip-audit --strict --skip-editable --ignore-vuln PYSEC-2022-43012 || true
        continue-on-error: true

  build-container:
    name: build container
    runs-on: ubuntu-latest
    needs: [test, lint, typecheck, security]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: quant-portfolio-kaizen:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
